<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adaptive E-Learning System</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        /* Specific styles to center the login card vertically */
        .login-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
    </style>
</head>

<body>

    <!-- Simple Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">AdaptiveLearning</a>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="container login-container">
        <div class="card login-card">
            <h2 class="text-center" style="margin-bottom: 2rem;">Student Login</h2>

            <!-- Error Display -->
            {% if error %}
            <div
                style="background: #fee; border: 1px solid #e74c3c; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; color: #c0392b;">
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form (Updated for Flask) -->
            <form action="/login" method="POST">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="student@university.edu"
                        required>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                        required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div class="text-center mt-1">
                <p style="font-size: 0.9rem;">
                    Don't have an account? <a href="/signup" style="text-decoration: underline;">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
